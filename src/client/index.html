<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PenPage Agent</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1 class="logo">PenPage Agent</h1>
    </header>
    <main class="chat-area">
      <div id="messages" class="messages"></div>
    </main>
    <footer class="footer">
      <div class="footer-top">
        <div id="session-bar" class="session-bar"></div>
        <div id="tool-selector" class="tool-selector"></div>
      </div>
      <div class="input-area">
        <textarea id="prompt-input" placeholder="Enter your prompt... (Cmd+Enter to send, /help for commands)" rows="3"></textarea>
        <button id="send-btn" class="send-btn">Run</button>
      </div>
    </footer>
  </div>
  <script type="module" src="./app.ts"></script>
</body>
</html>
